<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RMP Ratings</title>
    <style>
      :root {
        --usf-green: #006747;
        --usf-gold: #cfc493;
        --text: #1a1a1a;
        --muted: #6b6b6b;
        --border: #e3e3e3;
      }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        color: var(--text);
        background: #fff;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 700;
      }
      p.sub {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      select, input {
        width: 100%;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 5px;
        font-size: 13px;
        font-family: inherit;
        background: #fff;
      }
      select:focus, input:focus {
        outline: none;
        border-color: var(--usf-green);
      }
      .field { margin-bottom: 12px; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      button {
        width: 100%;
        padding: 8px 12px;
        border: 0;
        border-radius: 5px;
        background: var(--usf-green);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { opacity: 0.92; }
      .status {
        margin-top: 10px;
        padding: 7px 10px;
        border-radius: 5px;
        font-size: 12px;
        background: #f4f8f6;
        color: var(--usf-green);
        display: none;
      }
      .status.error { background: #fbecea; color: #c0392b; }
      .status.show { display: block; }
      .disclaimer {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        font-size: 10.5px;
        color: var(--muted);
        line-height: 1.45;
      }
      a { color: var(--usf-green); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>Professor Ratings</h1>
    <p class="sub">Choose your school. Ratings come from Rate My Professors.</p>

    <div class="field">
      <label for="preset">Quick pick</label>
      <select id="preset">
        <option value="">— select a school —</option>
        <option value="1262">University of South Florida (Tampa / Sarasota)</option>
        <option value="4383">USF — St. Petersburg</option>
        <option value="5122">USF — Lakeland</option>
        <option value="1100">University of Florida</option>
        <option value="1237">Florida State University</option>
        <option value="1082">University of Central Florida</option>
        <option value="1322">Florida International University</option>
        <option value="custom">Other — paste RMP school URL</option>
      </select>
    </div>

    <div class="field" id="customField" style="display:none">
      <label for="customUrl">RMP school URL</label>
      <input id="customUrl" type="text" placeholder="https://www.ratemyprofessors.com/school/1262" />
    </div>

    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <p class="disclaimer">
      Independent project. Not affiliated with any university or with Rate My Professors. Ratings may be inaccurate, outdated, or unrepresentative — use your judgment.
    </p>

    <script src="popup.js"></script>
  </body>
</html>

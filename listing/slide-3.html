<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Slide 3 — Ambiguity</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Split layout — text panel left, popover (with ambiguity banner) centered.

    width: 100%;
    height: 100%;
    background-image: url("/screenshots/raw/pradhan.png");

<div class="split">
  <div class="text">
    <span class="eyebrow">No more guessing</span>

    <div class="brand-mark">Professor Ratings for Course Search</div>

  </div>
